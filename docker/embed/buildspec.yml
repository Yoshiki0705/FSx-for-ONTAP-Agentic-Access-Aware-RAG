version: 0.2
phases:
  pre_build:
    commands:
      - echo Logging in to ECR...
      - aws ecr get-login-password --region ap-northeast-1 | docker login --username AWS --password-stdin 178625946981.dkr.ecr.ap-northeast-1.amazonaws.com
  build:
    commands:
      - echo Building embedding image...
      - ls -la
      - docker build --platform linux/amd64 -t embed-app:latest .
      - docker tag embed-app:latest 178625946981.dkr.ecr.ap-northeast-1.amazonaws.com/perm-rag-demo-demo-embedding:latest
  post_build:
    commands:
      - echo Pushing to ECR...
      - docker push 178625946981.dkr.ecr.ap-northeast-1.amazonaws.com/perm-rag-demo-demo-embedding:latest
      - echo Done.
