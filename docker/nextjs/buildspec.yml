version: 0.2
phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-northeast-1 | docker login --username AWS --password-stdin 178625946981.dkr.ecr.ap-northeast-1.amazonaws.com
      - IMAGE_TAG=retrieve-fix-$(date +%Y%m%d-%H%M%S)
      - ECR_URI=178625946981.dkr.ecr.ap-northeast-1.amazonaws.com/permission-aware-rag-webapp
  build:
    commands:
      - echo Building Docker image...
      - docker build --no-cache -t ${ECR_URI}:${IMAGE_TAG} -f Dockerfile .
      - docker tag ${ECR_URI}:${IMAGE_TAG} ${ECR_URI}:latest
  post_build:
    commands:
      - echo Pushing Docker image...
      - docker push ${ECR_URI}:${IMAGE_TAG}
      - docker push ${ECR_URI}:latest
      - echo Build completed on $(date)
