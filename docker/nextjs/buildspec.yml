version: 0.2
phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - aws ecr get-login-password --region ${AWS_DEFAULT_REGION:-ap-northeast-1} | docker login --username AWS --password-stdin ${ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION:-ap-northeast-1}.amazonaws.com
      - IMAGE_TAG=build-$(date +%Y%m%d-%H%M%S)
      - ECR_URI=${ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION:-ap-northeast-1}.amazonaws.com/permission-aware-rag-webapp
  build:
    commands:
      - echo Building Docker image...
      - docker build --no-cache -t ${ECR_URI}:${IMAGE_TAG} -f Dockerfile .
      - docker tag ${ECR_URI}:${IMAGE_TAG} ${ECR_URI}:latest
  post_build:
    commands:
      - echo Pushing Docker image...
      - docker push ${ECR_URI}:${IMAGE_TAG}
      - docker push ${ECR_URI}:latest
      - echo Build completed on $(date)
